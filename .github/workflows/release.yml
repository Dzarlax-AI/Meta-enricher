name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  windows:
    runs-on: windows-latest
    permissions:
      contents: write
    env:
      HAS_CERT: ${{ secrets.WINDOWS_CERT != '' }}

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false

      # Set Package.appxmanifest Identity/@Version from the git tag (v1.2.3 → 1.2.3.0)
      # so the Store gets a unique version per submission. Falls back to 0.0.0.<run>
      # for non-tag runs (manual dispatch) so we never reuse a Store version by accident.
      - name: Update manifest version
        shell: pwsh
        run: |
          $ref = "${{ github.ref_name }}"
          if ($ref -match '^v(\d+)\.(\d+)\.(\d+)$') {
            $ver = "$($Matches[1]).$($Matches[2]).$($Matches[3]).0"
          } else {
            $ver = "0.0.0.${{ github.run_number }}"
          }
          Write-Host "Setting manifest Version=$ver"
          $manifest = "Windows/MetaEnricher/Package.appxmanifest"
          $xml = [xml](Get-Content $manifest)
          $xml.Package.Identity.Version = $ver
          $xml.Save((Resolve-Path $manifest))

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      # WinAppSDK's MrtCore.PriGen.targets imports a task DLL from
      # $(MSBuildExtensionsPath32)\Microsoft\VisualStudio\v$(VisualStudioVersion)\AppxPackage\
      # When dotnet runs, MSBuildExtensionsPath32 = the dotnet SDK dir, where the
      # DLL isn't shipped. The DLL only ships with Visual Studio. Copy it across
      # so dotnet can find it where it expects.
      - name: Patch dotnet SDK with PriGen DLL from Visual Studio
        shell: pwsh
        run: |
          $vswhere = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe"
          $vsPath  = & $vswhere -latest -property installationPath
          Write-Host "VS install: $vsPath"

          $vsAppx = Get-ChildItem "$vsPath\MSBuild" -Filter AppxPackage -Recurse -Directory `
            | Where-Object { Test-Path "$($_.FullName)\Microsoft.Build.Packaging.Pri.Tasks.dll" } `
            | Select-Object -First 1
          if (-not $vsAppx) { throw "AppxPackage folder with PriGen DLL not found in VS" }
          $vsVerDir = $vsAppx.Parent.Name  # e.g. v17.0
          Write-Host "VS AppxPackage: $($vsAppx.FullName) (version dir: $vsVerDir)"

          $sdkVer  = (& dotnet --version).Trim()
          $sdkBase = "C:\Program Files\dotnet\sdk\$sdkVer"
          if (-not (Test-Path $sdkBase)) { throw "Active SDK not found at $sdkBase" }
          Write-Host "Active SDK base: $sdkBase"

          $target = Join-Path $sdkBase "Microsoft\VisualStudio\$vsVerDir\AppxPackage"
          New-Item -ItemType Directory -Path $target -Force | Out-Null
          Copy-Item "$($vsAppx.FullName)\*" $target -Force -Recurse
          Write-Host "Copied DLLs to: $target"
          Get-ChildItem $target | Select-Object Name

      # Download exiftool standalone exe from exiftool.org
      - name: Download exiftool
        shell: pwsh
        run: |
          $ver = (Invoke-WebRequest "https://exiftool.org/ver.txt").Content.Trim()
          Invoke-WebRequest "https://exiftool.org/exiftool-${ver}_64.zip" -OutFile exiftool.zip
          Expand-Archive exiftool.zip -DestinationPath exiftool_tmp
          # 64-bit distribution: exiftool(-k).exe + exiftool_files/ folder (Perl modules)
          $exe = Get-ChildItem exiftool_tmp -Filter "*.exe" -Recurse | Select-Object -First 1
          Copy-Item $exe.FullName Windows/MetaEnricher/exiftool.exe
          $filesDir = Get-ChildItem $exe.Directory -Filter "exiftool_files" -Directory -ErrorAction SilentlyContinue
          if ($filesDir) {
            Copy-Item $filesDir.FullName Windows/MetaEnricher/exiftool_files -Recurse -Force
          }
          Remove-Item exiftool.zip, exiftool_tmp -Recurse -Force

      # ── Portable build ────────────────────────────────────────────────────────
      - name: Build Portable (x64)
        shell: pwsh
        run: |
          dotnet publish Windows/MetaEnricher/MetaEnricher.csproj `
            -c Release -r win-x64 --self-contained `
            -p:Platform=x64 `
            -p:WindowsPackageType=None `
            -p:WindowsAppSDKSelfContained=true `
            -p:GenerateAppxPackageOnBuild=false `
            -p:PublishDir=publish-portable\

      - name: Zip Portable
        shell: pwsh
        run: |
          Compress-Archive `
            -Path Windows/MetaEnricher/publish-portable/* `
            -DestinationPath MetaEnricher-${{ github.ref_name }}-portable-x64.zip

      # ── MSIX build (Store-ready: self-contained .NET 9, x64 + ARM64 bundle) ───
      # Microsoft Store has no framework package for the .NET Desktop Runtime, so
      # framework-dependent MSIX builds crash at launch on clean test machines and
      # fail certification (10.1.2.10 + 10.2.4.1). build-msix.ps1 handles publish
      # for both architectures and bundles them into one .msixupload.
      - name: Build MSIX bundle (x64 + ARM64, self-contained)
        shell: pwsh
        working-directory: Windows
        run: .\build-msix.ps1

      # Read the manifest version that the previous step baked in, so subsequent
      # steps can reference the produced artifact filenames.
      - name: Read package version
        id: pkgver
        shell: pwsh
        run: |
          $xml = [xml](Get-Content "Windows/MetaEnricher/Package.appxmanifest")
          $v = $xml.Package.Identity.Version
          "version=$v" >> $env:GITHUB_OUTPUT

      # Sign the .msixbundle — only runs if WINDOWS_CERT secret is set. The Store
      # re-signs uploaded packages with its own cert anyway, so signing is mainly
      # useful for sideload testing of the same artifact.
      - name: Sign MSIX bundle
        if: env.HAS_CERT == 'true'
        shell: pwsh
        run: |
          $pfx = "$env:TEMP\sign.pfx"
          [IO.File]::WriteAllBytes($pfx, [Convert]::FromBase64String("${{ secrets.WINDOWS_CERT }}"))
          $signtool = Get-ChildItem "${env:ProgramFiles(x86)}\Windows Kits\10\bin" `
            -Recurse -Filter signtool.exe |
            Where-Object { $_.FullName -like "*x64*" } |
            Sort-Object FullName -Descending |
            Select-Object -First 1 -ExpandProperty FullName
          & $signtool sign /fd SHA256 /p "${{ secrets.WINDOWS_CERT_PASSWORD }}" /f $pfx `
            "Windows/MetaEnricher_${{ steps.pkgver.outputs.version }}_x64_arm64.msixbundle"

      # ── Artifacts (always — downloadable from workflow run page) ──────────────
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: MetaEnricher-${{ github.ref_name }}
          path: |
            MetaEnricher-${{ github.ref_name }}-portable-x64.zip
            Windows/MetaEnricher_${{ steps.pkgver.outputs.version }}_x64_arm64.msixbundle
            Windows/MetaEnricher_${{ steps.pkgver.outputs.version }}_x64_arm64.msixupload
          if-no-files-found: error

      # ── GitHub Release (only on tag push) ─────────────────────────────────────
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          generate_release_notes: true
          files: |
            MetaEnricher-${{ github.ref_name }}-portable-x64.zip
            Windows/MetaEnricher_${{ steps.pkgver.outputs.version }}_x64_arm64.msixbundle
            Windows/MetaEnricher_${{ steps.pkgver.outputs.version }}_x64_arm64.msixupload
