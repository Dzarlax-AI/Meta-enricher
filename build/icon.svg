<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <!-- Background -->
  <rect width="1024" height="1024" rx="224" fill="#1c1c1e"/>

  <!-- Subtle inner gradient -->
  <rect width="1024" height="1024" rx="224" fill="url(#bg-grad)" opacity="0.5"/>

  <!-- Camera aperture / lens shape — 6 blades -->
  <g transform="translate(512,512)">
    <!-- Outer ring -->
    <circle r="300" fill="none" stroke="#2c2c2e" stroke-width="18"/>

    <!-- Aperture blades -->
    <g fill="#3a3a3c">
      <ellipse rx="90" ry="260" transform="rotate(0)"  />
      <ellipse rx="90" ry="260" transform="rotate(60)" />
      <ellipse rx="90" ry="260" transform="rotate(120)"/>
    </g>

    <!-- Inner lens circle -->
    <circle r="160" fill="#2c2c2e"/>
    <circle r="148" fill="url(#lens-grad)"/>

    <!-- Blue accent pip — reflects the UI accent -->
    <circle r="52" fill="#0a84ff"/>
    <circle r="52" fill="url(#pip-shine)" opacity="0.4"/>

    <!-- Subtle specular on pip -->
    <ellipse cx="-14" cy="-18" rx="20" ry="12" fill="white" opacity="0.35" transform="rotate(-20)"/>
  </g>

  <!-- Thin metadata lines — EXIF feel -->
  <rect x="156" y="756" width="200" height="6"  rx="3" fill="#3a3a3c"/>
  <rect x="156" y="776" width="130" height="6"  rx="3" fill="#2c2c2e"/>
  <rect x="668" y="756" width="200" height="6"  rx="3" fill="#3a3a3c"/>
  <rect x="718" y="776" width="150" height="6"  rx="3" fill="#2c2c2e"/>

  <defs>
    <linearGradient id="bg-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.04"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="lens-grad" cx="40%" cy="35%">
      <stop offset="0%"   stop-color="#3a3a3c"/>
      <stop offset="100%" stop-color="#1c1c1e"/>
    </radialGradient>
    <radialGradient id="pip-shine" cx="30%" cy="25%">
      <stop offset="0%"   stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#0a84ff"/>
    </radialGradient>
  </defs>
</svg>
